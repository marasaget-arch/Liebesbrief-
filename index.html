<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nur für dich 💙</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Sacramento&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- ── AUDIO ── -->
  <!-- Замени src на свой файл музыки -->
  <audio id="bg-music" loop>
    <source src="music.mp3" type="audio/mpeg" />
  </audio>

  <!-- ── PARTICLES ── -->
  <canvas id="particles"></canvas>

  <!-- ════════════════════════════════
       STEP 1 — INTRO SCREEN
  ════════════════════════════════ -->
  <section id="intro" class="screen active">
    <div class="intro-content">
      <p class="intro-sub">Nur für dich</p>
      <h1 class="intro-title">Ein kleiner Brief<br /><em>für dein Herz</em></h1>
      <p class="intro-hint">Tippe auf das Siegel, öffne den Umschlag<br />und zieh den Brief heraus.</p>

      <div id="envelope-wrapper" class="envelope-wrapper">

        <!-- ENVELOPE -->
        <div id="envelope" class="envelope">

          <!-- Back of envelope (visible always) -->
          <div class="env-body">
            <div class="env-fold-left"></div>
            <div class="env-fold-right"></div>
            <div class="env-fold-bottom"></div>
          </div>

          <!-- Flap (top lid) -->
          <div class="env-flap" id="env-flap">
            <div class="env-flap-inner"></div>
          </div>

          <!-- Wax seal on flap -->
          <div class="wax-seal" id="wax-seal">
            <svg viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg">
              <circle cx="30" cy="30" r="28" fill="#1a3a5c" stroke="#4a90d9" stroke-width="1.5"/>
              <text x="30" y="36" text-anchor="middle" font-family="Sacramento,cursive" font-size="22" fill="#a8d0f0">D</text>
            </svg>
            <div class="seal-pulse"></div>
          </div>

          <!-- Letter peeking out (hidden initially) -->
          <div class="letter-peek" id="letter-peek">
            <div class="letter-peek-inner"></div>
          </div>

        </div>

        <!-- Pull hint arrow -->
        <div class="pull-hint" id="pull-hint">
          <span>↑</span>
          <p>Brief herausziehen</p>
        </div>

      </div>

      <!-- DICH text decoration -->
      <div class="dich-text">DICH</div>
    </div>
  </section>

  <!-- ════════════════════════════════
       STEP 2 — LETTER SCREEN
  ════════════════════════════════ -->
  <section id="letter-screen" class="screen">
    <div class="letter-sheet" id="letter-sheet">

      <div class="letter-header">
        <div class="letter-ornament">❧</div>
      </div>

      <div class="letter-body">
        <p id="typed-text" class="letter-text"></p>
        <span class="cursor" id="cursor">|</span>
      </div>

      <div class="letter-footer" id="letter-footer" style="opacity:0">
        <div class="footer-line"></div>
        <p class="footer-hint">Wenn du fertig bist, lege den Brief<br />zurück in den Umschlag.</p>
        <button id="return-btn" class="return-btn">Brief zurücklegen ↓</button>
      </div>

    </div>
  </section>

  <!-- ════════════════════════════════
       STEP 3 — ROSE FINALE
  ════════════════════════════════ -->
  <section id="finale" class="screen">
    <div class="finale-content">

      <!-- SVG Blue Rose -->
      <div class="rose-container" id="rose-container">
        <svg id="rose-svg" viewBox="0 0 300 380" xmlns="http://www.w3.org/2000/svg">
          <!-- Stem -->
          <line id="stem" x1="150" y1="370" x2="150" y2="200" stroke="#1a5c3a" stroke-width="4" stroke-linecap="round" class="stem-line"/>
          <!-- Leaf left -->
          <ellipse id="leaf-l" cx="122" cy="280" rx="22" ry="10" fill="#1a5c3a" transform="rotate(-35 122 280)" opacity="0"/>
          <!-- Leaf right -->
          <ellipse id="leaf-r" cx="178" cy="310" rx="22" ry="10" fill="#1a5c3a" transform="rotate(35 178 310)" opacity="0"/>

          <!-- Rose petals - outer ring -->
          <g id="petals-outer" opacity="0">
            <ellipse cx="150" cy="145" rx="38" ry="50" fill="#1a4a8a" transform="rotate(0 150 190)"/>
            <ellipse cx="150" cy="145" rx="38" ry="50" fill="#1a5aaa" transform="rotate(60 150 190)"/>
            <ellipse cx="150" cy="145" rx="38" ry="50" fill="#1a4a8a" transform="rotate(120 150 190)"/>
            <ellipse cx="150" cy="145" rx="38" ry="50" fill="#1a5aaa" transform="rotate(180 150 190)"/>
            <ellipse cx="150" cy="145" rx="38" ry="50" fill="#1a4a8a" transform="rotate(240 150 190)"/>
            <ellipse cx="150" cy="145" rx="38" ry="50" fill="#1a5aaa" transform="rotate(300 150 190)"/>
          </g>

          <!-- Rose petals - middle ring -->
          <g id="petals-mid" opacity="0">
            <ellipse cx="150" cy="155" rx="28" ry="38" fill="#2060c0" transform="rotate(30 150 190)"/>
            <ellipse cx="150" cy="155" rx="28" ry="38" fill="#2870d0" transform="rotate(90 150 190)"/>
            <ellipse cx="150" cy="155" rx="28" ry="38" fill="#2060c0" transform="rotate(150 150 190)"/>
            <ellipse cx="150" cy="155" rx="28" ry="38" fill="#2870d0" transform="rotate(210 150 190)"/>
            <ellipse cx="150" cy="155" rx="28" ry="38" fill="#2060c0" transform="rotate(270 150 190)"/>
            <ellipse cx="150" cy="155" rx="28" ry="38" fill="#2870d0" transform="rotate(330 150 190)"/>
          </g>

          <!-- Rose petals - inner -->
          <g id="petals-inner" opacity="0">
            <ellipse cx="150" cy="168" rx="18" ry="26" fill="#3080e8" transform="rotate(0 150 190)"/>
            <ellipse cx="150" cy="168" rx="18" ry="26" fill="#4090f0" transform="rotate(72 150 190)"/>
            <ellipse cx="150" cy="168" rx="18" ry="26" fill="#3080e8" transform="rotate(144 150 190)"/>
            <ellipse cx="150" cy="168" rx="18" ry="26" fill="#4090f0" transform="rotate(216 150 190)"/>
            <ellipse cx="150" cy="168" rx="18" ry="26" fill="#3080e8" transform="rotate(288 150 190)"/>
          </g>

          <!-- Rose center -->
          <circle id="rose-center" cx="150" cy="190" r="14" fill="#5aa0ff" opacity="0"/>
          <circle id="rose-center2" cx="150" cy="190" r="8" fill="#80c0ff" opacity="0"/>

          <!-- Shimmer overlay -->
          <ellipse id="shimmer" cx="140" cy="175" rx="12" ry="18" fill="white" opacity="0" transform="rotate(-20 140 175)"/>
        </svg>

        <!-- Floating petals particles -->
        <div class="petal-particles" id="petal-particles"></div>
      </div>

      <!-- Love message -->
      <div class="love-message" id="love-message">
        <p class="love-top">I Love You</p>
        <p class="love-bottom">Meine Komische Blondine</p>
      </div>

      <!-- Sparkles ring -->
      <div class="sparkle-ring" id="sparkle-ring"></div>

    </div>
  </section>

  <!-- ── Sound toggle ── -->
  <button id="sound-btn" class="sound-btn" title="Musik an/aus">♪</button>

  <script src="script.js"></script>
</body>
</html>
